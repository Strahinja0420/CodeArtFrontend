<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Paintbrush (top-left to bottom-right) -->
  <g transform="rotate(-45, 50, 50)">
    <!-- Handle -->
    <rect x="46" y="10" width="8" height="50" rx="3" fill="white"/>
    <!-- Ferrule -->
    <rect x="44" y="58" width="12" height="8" rx="1" fill="#aaa"/>
    <!-- Bristles -->
    <ellipse cx="50" cy="74" rx="7" ry="12" fill="white"/>
    <ellipse cx="50" cy="80" rx="4" ry="6" fill="#ccc"/>
  </g>

  <!-- Pencil (top-right to bottom-left) -->
  <g transform="rotate(45, 50, 50)">
    <!-- Body -->
    <rect x="46" y="12" width="8" height="52" rx="2" fill="white"/>
    <!-- Tip -->
    <polygon points="46,64 54,64 50,78" fill="#ddd"/>
    <!-- Lead -->
    <polygon points="48,72 52,72 50,78" fill="#555"/>
    <!-- Eraser end -->
    <rect x="46" y="10" width="8" height="6" rx="2" fill="#aaa"/>
  </g>
</svg>
